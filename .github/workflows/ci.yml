name: CI

# Runs on PRs to main and pushes to feature branches.
# The deploy-shiny.yml workflow handles tests + deploy on push to main,
# so this workflow intentionally skips main pushes to avoid duplication.

on:
  # Any PR targeting main that touches app code OR any workflow file:
  # this catches ci.yml + deploy-shiny.yml + any future workflow we add,
  # so workflow edits get tested before landing on main.
  pull_request:
    branches: [main]
    paths:
      - 'fondo_bienestar/**'
      - '.github/workflows/**'
  push:
    branches-ignore: [main]
    paths:
      - 'fondo_bienestar/**'
      - '.github/workflows/**'
  # Allow manual reruns from the Actions tab (handy when RSPM / CRAN blips).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # R unit + legislative tests (845 assertions, ~60s)
  # --------------------------------------------------------------------------
  r-tests:
    name: R tests (testthat)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true

      - name: Install R dependencies
        # setup-r @v2 with use-public-rspm=true points install.packages at
        # packagemanager.posit.co (Linux binaries). Leaving repos= default
        # is important -- forcing cloud.r-project.org triggers source
        # compilation and plotly fails to build on Ubuntu Noble runners.
        run: |
          Rscript -e "install.packages(c('shiny','bslib','shinyjs','plotly','dplyr','scales','testthat'), Ncpus=2)"

      - name: Run testthat
        working-directory: fondo_bienestar
        run: |
          Rscript -e '
            library(testthat)
            r1 <- test_file("tests/testthat/test_calculations.R", reporter = "progress")
            r2 <- test_file("tests/testthat/test_legislative.R", reporter = "progress")
            total <- sum(as.data.frame(r1)$nb) + sum(as.data.frame(r2)$nb)
            fails <- sum(as.data.frame(r1)$failed) + sum(as.data.frame(r2)$failed)
            cat("Total:", total, "Failures:", fails, "\n")
            if (fails > 0) quit(status = 1)
          '

  # --------------------------------------------------------------------------
  # Playwright smoke test (wizard end-to-end)
  # --------------------------------------------------------------------------
  e2e-smoke:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: r-tests

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('shiny','bslib','shinyjs','plotly','dplyr','scales'), Ncpus=2)"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'fondo_bienestar/e2e/package-lock.json'

      - name: Install Playwright deps
        working-directory: fondo_bienestar/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start Shiny app in background
        working-directory: fondo_bienestar
        run: |
          nohup R -e "shiny::runApp('.', host='0.0.0.0', port=3838, launch.browser=FALSE)" > shiny.log 2>&1 &
          echo $! > shiny.pid
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:3838/; then
              echo "Shiny ready after ${i}x3s"
              exit 0
            fi
            sleep 3
          done
          echo "Shiny failed to start"
          cat shiny.log
          exit 1

      - name: Run Playwright tests
        working-directory: fondo_bienestar/e2e
        env:
          CI: 'true'
          APP_URL: http://localhost:3838
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: fondo_bienestar/e2e/playwright-report/
          retention-days: 7

      - name: Upload Shiny log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shiny-log
          path: fondo_bienestar/shiny.log
          retention-days: 7

      - name: Stop Shiny
        if: always()
        working-directory: fondo_bienestar
        run: |
          if [ -f shiny.pid ]; then
            kill $(cat shiny.pid) 2>/dev/null || true
          fi
