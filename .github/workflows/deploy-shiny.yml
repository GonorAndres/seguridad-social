name: Deploy Shiny to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "fondo_bienestar/**"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: simulador-pension
  REPO_NAME: simulador-pension
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  test-r:
    name: R Unit Tests (845 assertions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('shiny', 'bslib', 'shinyjs', 'plotly', 'dplyr', 'scales', 'testthat'), Ncpus=2)"

      - name: Run R unit tests
        run: |
          cd fondo_bienestar
          Rscript tests/testthat.R

  test-e2e:
    name: Playwright E2E Tests (60 tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('shiny', 'bslib', 'shinyjs', 'plotly', 'dplyr', 'scales'), Ncpus=2)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright dependencies
        run: |
          cd fondo_bienestar/e2e
          npm ci
          npx playwright install chromium --with-deps

      - name: Start Shiny app
        run: |
          cd fondo_bienestar
          R -e "shiny::runApp('.', host='0.0.0.0', port=3838, launch.browser=FALSE)" &
          # Wait for app to be ready
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3838/ | grep -q 200; then
              echo "App ready after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Run Playwright E2E tests
        run: |
          cd fondo_bienestar/e2e
          APP_URL=http://localhost:3838 npx playwright test --timeout 180000
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: fondo_bienestar/e2e/playwright-report/
          retention-days: 14

  deploy:
    needs: [test-r, test-e2e]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f fondo_bienestar/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest \
            fondo_bienestar/

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --allow-unauthenticated
            --port=3838

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Deployed to: $URL"
          echo "## Deployed URL" >> $GITHUB_STEP_SUMMARY
          echo "$URL" >> $GITHUB_STEP_SUMMARY
